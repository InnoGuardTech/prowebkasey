name: Keep Render Backend Alive

on:
  schedule:
    # Runs every 14 minutes
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://qiyada-api.onrender.com/api/v1/auth/me || true
